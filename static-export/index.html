<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncTimer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --bg2:    #1a1d27;
      --bg3:    #252838;
      --border: #2d3148;
      --accent: #6366f1;
      --gold:   #d97706;
      --text:   #f1f5f9;
      --muted:  #64748b;
      --green:  #22c55e;
      --red:    #ef4444;
      --font-timer: 'Orbitron', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

    /* ── DISPLAY ── */
    #display {
      display: none;
      width: 100vw; height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #logo-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; transition: opacity 1s ease; z-index: 10;
    }
    #logo-overlay.visible { opacity: 1; }
    #logo-overlay img { height: 20vw; width: auto; object-fit: contain; }

    #timer-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      transition: opacity 0.5s ease;
    }
    #timer-wrap.hidden { opacity: 0; }

    #digits {
      font-family: var(--font-timer);
      font-size: clamp(3rem, 20vw, 18rem);
      font-weight: 900; line-height: 1; letter-spacing: 0.05em;
      color: var(--text); transition: color 0.3s;
    }
    #digits.overtime  { color: var(--red); }
    #digits.finished  { color: var(--gold); }

    #status-label {
      font-size: clamp(0.9rem, 2.5vw, 2rem);
      font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted);
    }

    #conn-badge-display {
      position: absolute; top: 1rem; left: 1rem;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--muted); opacity: 0.5;
    }
    #conn-badge-display .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    #conn-badge-display .dot.off { background: var(--red); }

    #sound-hint {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em;
      transition: opacity 0.5s;
    }
    #sound-hint.gone { opacity: 0; pointer-events: none; }

    #goto-admin {
      position: absolute; top: 1rem; right: 1rem;
      font-size: 1.25rem; color: var(--muted); text-decoration: none;
      opacity: 0.3; transition: opacity 0.2s;
    }
    #goto-admin:hover { opacity: 1; }

    /* ── ADMIN ── */
    #admin {
      display: none;
      min-height: 100vh; padding: 1.5rem 1rem 3rem;
      flex-direction: column; align-items: center; gap: 1rem;
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 520px;
    }

    .status-bar {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .dot.off { background: var(--red); }

    .panel-title {
      font-size: 1.3rem; font-weight: 800; letter-spacing: 0.15em;
      text-transform: uppercase; text-align: center;
    }

    .card {
      width: 100%; max-width: 520px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 0.75rem; padding: 1.25rem;
    }
    .card-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em;
      color: var(--muted); text-align: center; margin-bottom: 1rem;
    }

    .mode-toggle {
      display: grid; grid-template-columns: 1fr 1fr;
      border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border);
    }
    .mode-btn {
      padding: 0.85rem; font-weight: 800; font-size: 0.85rem;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
      border: none; background: var(--bg3); color: var(--muted); transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active { background: var(--text); color: var(--bg); }

    .time-input-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.5rem; }
    .time-col { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
    .time-col label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; color: var(--muted); }
    .time-colon { font-family: var(--font-timer); font-size: 2rem; font-weight: 900; color: var(--muted); }

    .arrow-btn {
      width: 100%; padding: 0.6rem;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 0.4rem;
      color: var(--text); font-size: 1rem; cursor: pointer; transition: background 0.15s;
    }
    .arrow-btn:hover { background: var(--border); }

    .time-num {
      font-family: var(--font-timer); font-size: 2.5rem; font-weight: 900;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 0.4rem;
      color: var(--text); text-align: center; width: 100%; padding: 0.5rem;
      -moz-appearance: textfield;
    }
    .time-num::-webkit-inner-spin-button,
    .time-num::-webkit-outer-spin-button { -webkit-appearance: none; }

    .btn {
      width: 100%; padding: 1rem;
      font-weight: 800; font-size: 0.9rem; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; border-radius: 0.5rem; cursor: pointer; transition: filter 0.15s;
    }
    .btn:hover  { filter: brightness(1.1); }
    .btn:active { filter: brightness(0.9); }
    .btn-start  { background: var(--accent); color: #fff; }
    .btn-pause  { background: var(--gold);   color: #fff; }
    .btn-resume { background: var(--green);  color: #fff; }
    .btn-reset  { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

    .shortcut {
      display: inline-block; margin-left: 0.5rem;
      font-size: 0.65rem; background: rgba(255,255,255,0.15);
      border-radius: 0.25rem; padding: 0.1rem 0.35rem;
      font-weight: 600; letter-spacing: 0.05em; vertical-align: middle;
    }

    .triggers-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
    }
    .trig-btn {
      padding: 0.85rem 0.5rem; font-family: var(--font-timer);
      font-weight: 700; font-size: 0.95rem;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 0.5rem;
      color: var(--text); cursor: pointer; transition: background 0.15s; text-align: center;
    }
    .trig-btn:hover { background: var(--border); }
    .trig-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; display: block; margin-top: 0.1rem; }

    .sounds-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.4rem; }
    .sound-btn {
      padding: 0.65rem 0.25rem;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 0.5rem;
      color: var(--text); cursor: pointer; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.05em; text-align: center; transition: background 0.15s, border-color 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
    }
    .sound-btn .icon { font-size: 1.1rem; }
    .sound-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #admin-clock {
      font-family: var(--font-timer); font-size: 2rem; font-weight: 900;
      text-align: center; margin: 0.25rem 0;
    }
    #admin-status { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); text-align: center; }

    #goto-display {
      font-size: 0.75rem; color: var(--muted); text-decoration: none;
      letter-spacing: 0.1em; padding: 0.5rem 1rem;
      border: 1px solid var(--border); border-radius: 0.4rem; transition: color 0.2s, border-color 0.2s;
    }
    #goto-display:hover { color: var(--text); border-color: var(--muted); }

    @media (max-width: 639px) {
      .desktop-only { display: none !important; }
      .triggers-grid { grid-template-columns: repeat(2, 1fr); }
      .trig-btn { padding: 1.2rem 0.5rem; font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     TELA DE EXIBIÇÃO  (index.html)
════════════════════════════════════════ -->
<div id="display">
  <div id="logo-overlay">
    <img src="idle-logo.svg" alt="Logo" />
  </div>

  <div id="timer-wrap">
    <div id="digits">00:00</div>
    <div id="status-label">PARADO</div>
  </div>

  <div id="conn-badge-display">
    <span class="dot" id="display-dot"></span>
    <span id="display-conn-text">CONECTANDO…</span>
  </div>

  <div id="sound-hint">toque para ativar o som</div>
  <a id="goto-admin" href="?admin" title="Painel de Controle">⚙</a>
</div>

<!-- ═══════════════════════════════════════
     PAINEL DE CONTROLE  (index.html?admin)
════════════════════════════════════════ -->
<div id="admin">
  <div class="top-bar">
    <div class="status-bar">
      <span class="dot" id="admin-dot"></span>
      <span id="admin-conn-text">CONECTANDO…</span>
    </div>
    <a id="goto-display" href="index.html">MODO TELA</a>
  </div>

  <div class="panel-title">PAINEL DE CONTROLE</div>
  <div id="admin-status">PARADO | REGRESSIVO</div>
  <div id="admin-clock">00:00</div>

  <div class="card">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-countdown" onclick="setMode('countdown')">REGRESSIVO</button>
      <button class="mode-btn"        id="btn-countup"   onclick="setMode('countup')">PROGRESSIVO</button>
    </div>
  </div>

  <div class="card desktop-only">
    <div class="time-input-row">
      <div class="time-col">
        <label>MIN</label>
        <button class="arrow-btn" onclick="adjustMin(1)">▲</button>
        <input class="time-num" type="number" id="inp-min" value="0" min="0" max="99" />
        <button class="arrow-btn" onclick="adjustMin(-1)">▼</button>
      </div>
      <span class="time-colon">:</span>
      <div class="time-col">
        <label>SEG</label>
        <button class="arrow-btn" onclick="adjustSec(1)">▲</button>
        <input class="time-num" type="number" id="inp-sec" value="0" min="0" max="59" />
        <button class="arrow-btn" onclick="adjustSec(-1)">▼</button>
      </div>
    </div>
    <div style="margin-top:1rem;">
      <button class="btn btn-start" onclick="setAndStart()">
        DEFINIR E INICIAR <span class="shortcut">ENTER</span>
      </button>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-pause" id="btn-pause-resume" onclick="pauseResume()">
      PAUSAR <span class="shortcut">ESPAÇO</span>
    </button>
    <div style="margin-top:0.6rem;">
      <button class="btn btn-reset" onclick="resetTimer()">
        RESETAR TIMER <span class="shortcut">R</span>
      </button>
    </div>
  </div>

  <div class="card desktop-only">
    <div class="card-label">SOM DO TIMER</div>
    <div class="sounds-grid">
      <button class="sound-btn" data-preset="bipe"    onclick="setSound('bipe')">   <span class="icon">📡</span>BIPE</button>
      <button class="sound-btn" data-preset="sino"    onclick="setSound('sino')">   <span class="icon">🔔</span>SINO</button>
      <button class="sound-btn" data-preset="digital" onclick="setSound('digital')"><span class="icon">💻</span>DIGITAL</button>
      <button class="sound-btn" data-preset="suave"   onclick="setSound('suave')">  <span class="icon">🎵</span>SUAVE</button>
      <button class="sound-btn active" data-preset="nenhum" onclick="setSound('nenhum')"><span class="icon">🔇</span>NENHUM</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">GATILHOS RÁPIDOS</div>
    <div class="triggers-grid">
      <button class="trig-btn" onclick="quickStart(60)">  1m <span class="trig-label">[1]</span></button>
      <button class="trig-btn" onclick="quickStart(180)"> 3m <span class="trig-label">[3]</span></button>
      <button class="trig-btn" onclick="quickStart(300)"> 5m <span class="trig-label">[5]</span></button>
      <button class="trig-btn" onclick="quickStart(900)">15m <span class="trig-label">[F]</span></button>
      <button class="trig-btn" onclick="quickStart(1800)">30m</button>
      <button class="trig-btn" onclick="quickStart(2700)">45m</button>
      <button class="trig-btn" onclick="quickStart(3600)"> 1h</button>
      <button class="trig-btn" onclick="quickStart(7200)"> 2h</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  CONFIG — ajuste se precisar
// ════════════════════════════════════════
const API_URL      = 'api.php';   // caminho para api.php no servidor
const POLL_MS      = 500;         // intervalo de polling (ms)

// ════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════
const DEFAULT_STATE = {
  mode: 'countdown', status: 'idle',
  initialSeconds: 0, currentSeconds: 0,
  overtime: false, soundPreset: 'nenhum', ts: 0,
};
let state       = { ...DEFAULT_STATE };
let tickInterval = null;
let lastTs       = 0;

const isAdmin = location.search.includes('admin');

// ════════════════════════════════════════
//  WEB AUDIO
// ════════════════════════════════════════
let audioCtx  = null;

function primeAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('sound-hint')?.classList.add('gone');
}

function playSound(preset) {
  if (!audioCtx || preset === 'nenhum') return;
  const ctx = audioCtx;
  const t   = ctx.currentTime;

  const beep = (freq, dur, type = 'sine', vol = 0.4) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  };

  if      (preset === 'bipe')    { beep(880, 0.12); }
  else if (preset === 'sino')    { beep(1046, 0.8, 'sine', 0.3); beep(1318, 0.6, 'sine', 0.15); }
  else if (preset === 'digital') { beep(440, 0.05, 'square', 0.25); setTimeout(() => { const tt=ctx.currentTime,o2=ctx.createOscillator(),g2=ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.type='square'; o2.frequency.value=880; g2.gain.setValueAtTime(0.25,tt); g2.gain.exponentialRampToValueAtTime(0.001,tt+0.05); o2.start(tt); o2.stop(tt+0.1); }, 80); }
  else if (preset === 'suave')   { beep(523, 0.5, 'sine', 0.25); beep(659, 0.4, 'sine', 0.15); }
}

// ════════════════════════════════════════
//  COMUNICAÇÃO COM API
// ════════════════════════════════════════
let online = false;

function setOnline(ok) {
  online = ok;
  const dot  = document.getElementById(isAdmin ? 'admin-dot'       : 'display-dot');
  const text = document.getElementById(isAdmin ? 'admin-conn-text'  : 'display-conn-text');
  if (!dot || !text) return;
  dot.classList.toggle('off', !ok);
  text.textContent = ok ? 'ONLINE' : 'OFFLINE';
}

async function pushState() {
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    setOnline(r.ok);
  } catch {
    setOnline(false);
  }
}

async function pullState() {
  try {
    const r = await fetch(API_URL + '?_=' + Date.now());
    if (!r.ok) { setOnline(false); return; }
    const data = await r.json();
    setOnline(true);
    if (data.ts !== undefined && data.ts > lastTs) {
      lastTs = data.ts;
      state  = { ...DEFAULT_STATE, ...data };
      renderDisplay();
    }
  } catch {
    setOnline(false);
  }
}

// ════════════════════════════════════════
//  TIMER (roda no admin)
// ════════════════════════════════════════
function startTick() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(async () => {
    if (state.status !== 'running') return;

    if (state.mode === 'countdown') {
      if (state.currentSeconds > 0) {
        state.currentSeconds--;
        if (state.currentSeconds === 0) {
          state.status  = 'finished';
          state.overtime = false;
        }
      } else {
        state.overtime = true;
        state.currentSeconds--;
      }
    } else {
      state.currentSeconds++;
    }

    renderAdmin();
    await pushState();
  }, 1000);
}

function stopTick() {
  if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
}

// ════════════════════════════════════════
//  COMANDOS (admin)
// ════════════════════════════════════════
function setMode(m) {
  state.mode = m;
  document.getElementById('btn-countdown').classList.toggle('active', m === 'countdown');
  document.getElementById('btn-countup').classList.toggle('active', m === 'countup');
  renderAdmin();
  pushState();
}

async function setAndStart() {
  const mins  = parseInt(document.getElementById('inp-min').value)  || 0;
  const secs  = parseInt(document.getElementById('inp-sec').value)  || 0;
  const total = mins * 60 + secs;
  state.initialSeconds  = total;
  state.currentSeconds  = total;
  state.status          = 'running';
  state.overtime        = false;
  startTick();
  renderAdmin();
  playSound(state.soundPreset);
  await pushState();
}

async function quickStart(seconds) {
  state.initialSeconds  = seconds;
  state.currentSeconds  = seconds;
  state.status          = 'running';
  state.overtime        = false;

  if (state.mode === 'countdown') {
    document.getElementById('inp-min').value = Math.floor(seconds / 60);
    document.getElementById('inp-sec').value = seconds % 60;
  }

  startTick();
  renderAdmin();
  playSound(state.soundPreset);
  await pushState();
}

async function pauseResume() {
  if (state.status === 'running') {
    state.status = 'paused';
    stopTick();
    playSound(state.soundPreset);
  } else if (state.status === 'paused' || state.status === 'finished') {
    state.status = 'running';
    startTick();
    playSound(state.soundPreset);
  } else {
    await setAndStart();
    return;
  }
  renderAdmin();
  await pushState();
}

async function resetTimer() {
  stopTick();
  state.status          = 'idle';
  state.currentSeconds  = 0;
  state.initialSeconds  = 0;
  state.overtime        = false;
  renderAdmin();
  await pushState();
}

async function setSound(preset) {
  state.soundPreset = preset;
  document.querySelectorAll('.sound-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === preset);
  });
  playSound(preset);
  await pushState();
}

function adjustMin(d) {
  const i = document.getElementById('inp-min');
  i.value = Math.max(0, Math.min(99, (parseInt(i.value) || 0) + d));
}
function adjustSec(d) {
  const i = document.getElementById('inp-sec');
  i.value = Math.max(0, Math.min(59, (parseInt(i.value) || 0) + d));
}

// ════════════════════════════════════════
//  FORMATO
// ════════════════════════════════════════
function fmt(s) {
  const neg = s < 0;
  const abs = Math.abs(s);
  const h   = Math.floor(abs / 3600);
  const m   = Math.floor((abs % 3600) / 60);
  const sec = abs % 60;
  const pad = n => String(n).padStart(2, '0');
  const str = h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
  return neg ? `+${str}` : str;
}

function statusTxt(s) {
  const mode = s.mode === 'countdown' ? 'REGRESSIVO' : 'PROGRESSIVO';
  if (s.status === 'idle')    return `PARADO | ${mode}`;
  if (s.status === 'paused')  return `PAUSADO | ${mode}`;
  if (s.overtime)             return `TEMPO ESGOTADO | ${mode}`;
  if (s.status === 'finished') return `TEMPO ESGOTADO | ${mode}`;
  return `EM EXECUÇÃO | ${mode}`;
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
let logoTimer = null;

function renderDisplay() {
  document.getElementById('digits').textContent = fmt(state.currentSeconds);
  document.getElementById('status-label').textContent = statusTxt(state);

  const digits = document.getElementById('digits');
  digits.className = state.overtime ? 'overtime' : state.status === 'finished' ? 'finished' : '';

  const logo = document.getElementById('logo-overlay');
  const wrap = document.getElementById('timer-wrap');
  clearTimeout(logoTimer);

  if (state.status === 'running') {
    logo.classList.remove('visible');
    wrap.classList.remove('hidden');
  } else if (state.status === 'idle') {
    logoTimer = setTimeout(() => { logo.classList.add('visible'); wrap.classList.add('hidden'); }, 3000);
  } else if (state.status === 'finished' || state.overtime) {
    logoTimer = setTimeout(() => { logo.classList.add('visible'); }, 30000);
  } else {
    logo.classList.remove('visible');
    wrap.classList.remove('hidden');
  }
}

function renderAdmin() {
  document.getElementById('admin-clock').textContent  = fmt(state.currentSeconds);
  document.getElementById('admin-status').textContent = statusTxt(state);

  const btn = document.getElementById('btn-pause-resume');
  if (state.status === 'running') {
    btn.innerHTML = 'PAUSAR <span class="shortcut">ESPAÇO</span>';
    btn.className = 'btn btn-pause';
  } else if (state.status === 'paused') {
    btn.innerHTML = 'RETOMAR <span class="shortcut">ESPAÇO</span>';
    btn.className = 'btn btn-resume';
  } else {
    btn.innerHTML = 'INICIAR <span class="shortcut">ESPAÇO</span>';
    btn.className = 'btn btn-start';
  }

  document.getElementById('btn-countdown').classList.toggle('active', state.mode === 'countdown');
  document.getElementById('btn-countup').classList.toggle('active',   state.mode === 'countup');

  document.querySelectorAll('.sound-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === state.soundPreset);
  });
}

// ════════════════════════════════════════
//  TECLADO
// ════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (!isAdmin) return;
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); pauseResume(); }
  if (e.code === 'Enter') { e.preventDefault(); setAndStart(); }
  if (e.code === 'KeyR')  { e.preventDefault(); resetTimer();  }
  if (e.code === 'Digit1') quickStart(60);
  if (e.code === 'Digit3') quickStart(180);
  if (e.code === 'Digit5') quickStart(300);
  if (e.code === 'KeyF')   quickStart(900);
});

// ════════════════════════════════════════
//  INICIALIZAÇÃO
// ════════════════════════════════════════
(async function init() {
  if (isAdmin) {
    document.getElementById('admin').style.display = 'flex';

    // Busca estado atual do servidor para sincronizar ao abrir
    try {
      const r = await fetch(API_URL + '?_=' + Date.now());
      if (r.ok) {
        const data = await r.json();
        state  = { ...DEFAULT_STATE, ...data };
        lastTs = data.ts || 0;
        // Se estava rodando, mantém pausado (o tick perdeu-se ao fechar)
        if (state.status === 'running') { state.status = 'paused'; }
        setOnline(true);
      }
    } catch { setOnline(false); }

    renderAdmin();

    // Polling para manter admin em sync com outros adminstradores (raro, mas útil)
    setInterval(async () => {
      if (state.status === 'running') return; // admin é quem comanda quando rodando
      try {
        const r = await fetch(API_URL + '?_=' + Date.now());
        if (!r.ok) { setOnline(false); return; }
        const data = await r.json();
        setOnline(true);
        if (data.ts > lastTs) { lastTs = data.ts; state = { ...DEFAULT_STATE, ...data }; renderAdmin(); }
      } catch { setOnline(false); }
    }, 2000);

    document.addEventListener('click',   primeAudio, { once: true });
    document.addEventListener('keydown', primeAudio, { once: true });

  } else {
    document.getElementById('display').style.display = 'flex';

    // Polling a cada 500ms
    setInterval(pullState, POLL_MS);
    pullState(); // imediato

    document.addEventListener('click', primeAudio, { once: true });
  }
})();
</script>
