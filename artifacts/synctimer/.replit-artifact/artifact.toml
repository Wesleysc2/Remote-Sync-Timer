kind = "web"
previewPath = "/"
title = "SyncTimer"
version = "1.0.0"
id = "artifacts/synctimer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19211

[services.development]
run = "pnpm --filter @workspace/synctimer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/synctimer", "run", "build" ]
publicDir = "artifacts/synctimer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19211"
BASE_PATH = "/"
